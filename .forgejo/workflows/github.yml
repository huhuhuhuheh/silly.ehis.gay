name: Mirror to GitHub

on:
  push:
    branches:
      - master

jobs:
  mirror:
    runs-on: docker
    if: github.actor != 'nothuhinabot'
    steps:
      - name: Checkout Forgejo Repository
        uses: https://github.com/actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate GitHub App Token
        id: get-token
        uses: https://github.com/actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}
          owner: huhuhuhuheh
          repositories: silly.ehis.gay
          github-api-url: https://api.github.com

      - name: Sync commits one by one to GitHub
        env:
          GH_TOKEN: ${{ steps.get-token.outputs.token }}
        run: |
          git config user.name "nothuhinabot[bot]"
          git config user.email "pullbot@git.gay"

          git remote add github "https://x-access-token:${GH_TOKEN}@github.com/huhuhuhuheh/silly.ehis.gay.git" || true

          git fetch github master --depth=100 || true

          BASE=$(git merge-base HEAD github/master 2>/dev/null || echo "")
          if [ -z "$BASE" ]; then
            COMMITS=$(git rev-list --reverse HEAD)
          else
            COMMITS=$(git rev-list --reverse $BASE..HEAD)
          fi

          for COMMIT in $COMMITS; do
            git checkout -B temp-sync $COMMIT
            git reset --soft $COMMIT

            FILES=$(git diff-tree --no-commit-id --name-only -r $COMMIT | tr '\n' ' ' | sed 's/ $//')
            if [ -z "$FILES" ]; then FILES="multiple files"; fi

            COMMIT_MSG="Synced $FILES from git.gay https://git.gay/huhuhuhuheh/silly.ehis.gay/commit/$COMMIT"

            git commit --amend -m "$COMMIT_MSG" --no-edit --reset-author || true

            git push --force github HEAD:master
          done

          git checkout master