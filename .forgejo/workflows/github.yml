name: Mirror to GitHub

on:
  push:
    branches:
      - master

jobs:
  mirror:
    runs-on: docker
    if: github.actor != 'nothuhinabot'

    steps:
      - name: Checkout Forgejo Repository
        uses: https://github.com/actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install GitHub CLI
        run: |
          set -e
          type -p wget >/dev/null || (apt-get update && apt-get install -y wget)
          mkdir -p -m 755 /etc/apt/keyrings
          out=$(mktemp)
          wget -nv -O "$out" https://cli.github.com/packages/githubcli-archive-keyring.gpg
          cat "$out" > /etc/apt/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          mkdir -p -m 755 /etc/apt/sources.list.d
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" > /etc/apt/sources.list.d/github-cli.list
          apt-get update
          apt-get install -y gh

      - name: Generate GitHub App Token
        id: get-token
        uses: https://github.com/actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}
          owner: huhuhuhuheh
          repositories: silly.ehis.gay
          github-api-url: https://api.github.com

      - name: Get GitHub App User ID
        id: get-user-id
        env:
          GH_TOKEN: ${{ steps.get-token.outputs.token }}
        run: |
          APP_SLUG='${{ steps.get-token.outputs.app-slug }}'
          echo "user-id=$(gh api "/users/${APP_SLUG}%5Bbot%5D" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Sync commits one by one to GitHub
        env:
          GH_TOKEN: ${{ steps.get-token.outputs.token }}
          BOT_SLUG: ${{ steps.get-token.outputs.app-slug }}
          BOT_USER_ID: ${{ steps.get-user-id.outputs.user-id }}
        run: |
          set -e

          git remote add github "https://x-access-token:${GH_TOKEN}@github.com/huhuhuhuheh/silly.ehis.gay.git" || true
          git fetch github master --depth=100 || true

          BASE=$(git merge-base HEAD github/master 2>/dev/null || true)
          if [ -z "$BASE" ]; then
            COMMITS=$(git rev-list --reverse HEAD)
          else
            COMMITS=$(git rev-list --reverse "${BASE}..HEAD")
          fi

          if git rev-parse --verify github/master >/dev/null 2>&1; then
            git checkout -B sync github/master
          else
            git checkout --orphan sync
            git rm -rf . >/dev/null 2>&1 || true
          fi

          BOT_NAME="${BOT_SLUG}[bot]"
          BOT_EMAIL="${BOT_USER_ID}+${BOT_SLUG}[bot]@users.noreply.github.com"

          for COMMIT in $COMMITS; do
            FILES=$(git diff-tree --no-commit-id --name-only -r "$COMMIT" | tr '\n' ' ' | sed 's/ $//')
            [ -n "$FILES" ] || FILES="multiple files"

            MSG="Synced ${FILES} from git.gay: https://git.gay/huhuhuhuheh/silly.ehis.gay/commit/${COMMIT}"

            TREE=$(git rev-parse "${COMMIT}^{tree}")
            PARENT=$(git rev-parse HEAD)

            NEW_COMMIT=$(
              GIT_AUTHOR_NAME="$BOT_NAME" \
              GIT_AUTHOR_EMAIL="$BOT_EMAIL" \
              GIT_COMMITTER_NAME="$BOT_NAME" \
              GIT_COMMITTER_EMAIL="$BOT_EMAIL" \
              git commit-tree "$TREE" -p "$PARENT" -m "$MSG"
            )

            git reset --hard "$NEW_COMMIT"
          done

          git push --force github sync:master