name: Mirror to GitHub

on:
  push:
    branches:
      - master

jobs:
  mirror:
    runs-on: docker
    steps:
      - name: Checkout Forgejo Repository
        uses: https://github.com/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App Token
        id: get-token
        uses: https://github.com/actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}
          owner: huhuhuhuheh
          repositories: silly.ehis.gay
          github-api-url: https://api.github.com

      - name: Push Commit to GitHub
        run: |
          git remote add github https://x-access-token:${{ steps.get-token.outputs.token }}@github.com/huhuhuhuheh/silly.ehis.gay.git
          git push --force github HEAD:master

      - name: Comment on GitHub Commit
        run: |
          FILES=$(git diff-tree --no-commit-id --name-only -r HEAD | tr '\n' ', ' | sed 's/, $//')
          COMMENT="Syncing to huhuhuhuheh/silly.ehis.gay\n\nFiles: $FILES"
          
          PAYLOAD=$(jq -n --arg body "$COMMENT" '{body: $body}')
          
          curl -s -X POST "https://api.github.com/repos/huhuhuhuheh/silly.ehis.gay/commits/$GITHUB_SHA/comments" \
            -H "Authorization: Bearer ${{ steps.get-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "$PAYLOAD"