version: 2.1

jobs:
  merge_image_prs:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Check image PRs
          command: |
            set +x
            set -euo pipefail
            umask 077

            sudo apt-get update
            sudo apt-get install -y gh jq openssl

            KEY_FILE="$(mktemp)"
            trap 'rm -f "$KEY_FILE"' EXIT

            printf '%s' "$GITHUB_APP_KEY" | base64 --decode > "$KEY_FILE"

            b64url() {
              openssl base64 -A | tr '+/' '-_' | tr -d '='
            }

            now="$(date +%s)"
            header="$(printf '{"alg":"RS256","typ":"JWT"}' | b64url)"
            payload="$(printf '{"iat":%s,"exp":%s,"iss":%s}' "$((now-60))" "$((now+540))" "$GITHUB_APP_ID" | b64url)"
            sig="$(printf '%s.%s' "$header" "$payload" | openssl dgst -sha256 -sign "$KEY_FILE" -binary | b64url)"
            jwt="$header.$payload.$sig"

            token="$(gh api -X POST "/app/installations/${GITHUB_APP_INSTALLATION_ID}/access_tokens" -H "Authorization: Bearer ${jwt}" --jq '.token')"
            export GH_TOKEN="$token"

            repo_path="$(git config --get remote.origin.url | sed -E 's#^(git@github.com:|https://github.com/)##; s#\.git$##')"
            branch="${CIRCLE_BRANCH:-}"

            if [ -z "$branch" ]; then
              exit 0
            fi

            pr_number="$(gh pr list --state open --head "$branch" --json number --jq '.[0].number // empty')"

            if [ -z "${pr_number:-}" ]; then
              exit 0
            fi

            pr_info="$(gh pr view "$pr_number" --json author,url,baseRefName --jq '[.author.login, .url, .baseRefName] | @tsv')"
            set -- $pr_info
            author="${1:-}"
            pr_url="${2:-}"
            base_ref="${3:-}"

            if [ "$author" = "renovate[bot]" ]; then
              exit 0
            fi

            if [ "$base_ref" != "main" ]; then
              exit 0
            fi

            mapfile -t files < <(gh api "/repos/${repo_path}/pulls/${pr_number}/files" --paginate --jq '.[].filename')

            if [ "${#files[@]}" -eq 0 ]; then
              exit 0
            fi

            has_allowed_image=0
            needs_public=0
            invalid=0

            for file in "${files[@]}"; do
              case "$file" in
                public/*.png|public/*.jpg|public/*.jpeg|public/*.gif|public/*.webp|public/*.avif)
                  has_allowed_image=1
                  ;;
                *.png|*.jpg|*.jpeg|*.gif|*.webp|*.avif)
                  has_allowed_image=1
                  needs_public=1
                  ;;
                *)
                  invalid=1
                  ;;
              esac
            done

            if [ "$invalid" -eq 1 ]; then
              exit 0
            fi

            if [ "$has_allowed_image" -ne 1 ]; then
              exit 0
            fi

            if [ "$needs_public" -eq 1 ]; then
              gh pr comment "$pr_number" -b "Please move the image files to the public/ folder before this can be merged."
              exit 0
            fi

            gh pr merge "$pr_number" --merge --subject "New image" --body "New image (${pr_url})"
            gh pr comment "$pr_number" -b "Merged because it is just an image/gif allowed type *(Performed by a bot)*"

workflows:
  merge_image_prs:
    jobs:
      - merge_image_prs